repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.4
    hooks:
      - id: golangci-lint
        args: [--config=backend/.golangci.yml]
        entry: bash -c 'cd backend && golangci-lint run --config=.golangci.yml'
  - repo: local
    hooks:
      - id: biome-check
        name: Biome Check (Frontend)
        entry: bash -c 'cd frontend && bun run biome check'
        language: system
        pass_filenames: false
      - id: typescript-check
        name: TypeScript Check (Frontend)
        entry: bash -c 'cd frontend && bun run tsc --noEmit'
        language: system
        pass_filenames: false
